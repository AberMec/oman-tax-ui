<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oman Tax Compliance Service</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <h1>Oman Tax Compliance Service</h1>
    <p>Simple, Transparent, and Scalable Tax Calculation</p>
</header>

<!-- ================= MAIN CARD ================= -->
<main class="container">

    <section class="card">

        <h2>Tax Calculator</h2>
        <p class="description">
            Enter your income below to estimate your tax liability.
            This demo uses a simplified flat rate model.
        </p>

        <!-- INPUT -->
        <label for="income">Income (OMR)</label>
        <input type="number" id="income" placeholder="Enter income amount">

        <!-- BUTTON -->
        <button onclick="calculateTax()">Calculate Tax</button>

        <!-- RESULT -->
        <div id="result" class="result hidden"></div>

    </section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 Oman Tax Compliance Service — Demo Interface</p>
    <p class="note">
        Note: Backend services are private and secured.
    </p>
</footer>

<!-- ================= SCRIPT ================= -->
<script>
    /**
     * calculateTax()
     * --------------------------------------------------------------
     * Simulates backend tax calculation logic for demo purposes.
     * In production, this would call:
     *   POST /api/tax/calculate
     * --------------------------------------------------------------
     */
    function calculateTax() {

        const incomeInput = document.getElementById("income");
        const resultBox = document.getElementById("result");

        const income = parseFloat(incomeInput.value);

        if (!income || income <= 0) {
            resultBox.classList.remove("hidden");
            resultBox.innerHTML = "⚠ Please enter a valid income value.";
            return;
        }

        // Simulated tax logic (5%)
        const taxRate = 5;
        const taxAmount = income * (taxRate / 100);
        const netIncome = income - taxAmount;

        resultBox.classList.remove("hidden");
        resultBox.innerHTML = `
                <h3>Calculation Result</h3>
                <p><strong>Income:</strong> ${income.toFixed(2)} OMR</p>
                <p><strong>Tax Amount:</strong> ${taxAmount.toFixed(2)} OMR</p>
                <p><strong>Net Income:</strong> ${netIncome.toFixed(2)} OMR</p>
                <p><strong>Applied Rate:</strong> ${taxRate}%</p>
                <p class="info">This is a demo calculation (frontend only).</p>
            `;
    }
</script>

</body>
</html>
